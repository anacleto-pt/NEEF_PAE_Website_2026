<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso — NEEF-UA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <script>
        /* Redirect immediately if already authenticated */
        if (sessionStorage.getItem('neef_admin')) {
            window.location.replace('admin.html');
        }
    </script>
</head>
<body class="admin-login-body">

    <div class="login-wrapper">
        <div class="login-card" id="login-card">

            <div class="login-header">
                <a href="index.html" class="logo">
                    <span class="logo-main">NEEF</span><span class="logo-sub">–UA</span>
                </a>
                <div class="login-lock-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
                        <rect width="18" height="11" x="3" y="11" rx="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <p class="login-subtitle">Área restrita</p>
            </div>

            <form id="login-form" class="login-form" autocomplete="off" novalidate>
                <div class="form-group">
                    <label for="l-user">Utilizador</label>
                    <input type="text" id="l-user" placeholder="utilizador" autocomplete="username" spellcheck="false">
                </div>
                <div class="form-group">
                    <label for="l-pass">Palavra-passe</label>
                    <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password">
                </div>
                <p id="login-error" class="login-error" aria-live="polite"></p>
                <button type="submit" class="btn-primary btn-full login-submit-btn">Entrar</button>
            </form>

            <a href="index.html" class="login-back">← Voltar ao site</a>

        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const user  = document.getElementById('l-user').value.trim();
            const pass  = document.getElementById('l-pass').value;
            const errEl = document.getElementById('login-error');
            const card  = document.getElementById('login-card');

            if (user === 'admin' && pass === 'admin') {
                sessionStorage.setItem('neef_admin', '1');
                window.location.replace('admin.html');
            } else {
                errEl.textContent = 'Credenciais inválidas. Tenta novamente.';
                card.classList.remove('shake');
                /* force reflow so animation restarts */
                void card.offsetWidth;
                card.classList.add('shake');
                document.getElementById('l-pass').value = '';
                document.getElementById('l-pass').focus();
            }
        });

        /* Clear error on input */
        ['l-user', 'l-pass'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                document.getElementById('login-error').textContent = '';
            });
        });
    </script>
</body>
</html>
